# Netlify Configuration File for True Life Productions
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

[build.processing]
  # Enable built-in optimization on deploy
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
